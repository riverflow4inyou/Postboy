name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync version from tag
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.replace(/^v/, '');
          if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Unsupported release tag: ${tag}`);
          }

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          }

          function writeJson(path, data) {
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          }

          const packageJson = readJson('package.json');
          packageJson.version = version;
          writeJson('package.json', packageJson);

          const packageLock = readJson('package-lock.json');
          packageLock.version = version;
          if (packageLock.packages?.['']) {
            packageLock.packages[''].version = version;
          }
          writeJson('package-lock.json', packageLock);

          const tauriConfig = readJson('src-tauri/tauri.conf.json');
          tauriConfig.version = version;
          writeJson('src-tauri/tauri.conf.json', tauriConfig);

          const cargoTomlPath = 'src-tauri/Cargo.toml';
          const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8')
            .replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoTomlPath, cargoToml);

          const appVuePath = 'src/App.vue';
          const appVue = fs.readFileSync(appVuePath, 'utf8')
            .replace(/<span>v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?<\/span>/, `<span>v${version}</span>`);
          fs.writeFileSync(appVuePath, appVue);

          console.log(`Synced app version from ${tag} to ${version}`);
          NODE

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Postboy ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install Postboy.

            - macOS Apple Silicon: `aarch64` `.dmg`
            - macOS Intel: `x86_64` `.dmg`
            - Windows: `.msi` or `-setup.exe`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
